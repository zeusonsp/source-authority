# source-authority-brand-monitor — Pilar 2: detecção de uso indevido de marca.
#
# Roda em 2 cron triggers:
#   - */15 * * * *  (every 15min) — CT log poll via Cert Spotter API
#   - 0 12 * * *    (12:00 UTC = 09:00 BRT) — digest diário de alertas
#                                              medium/low das últimas 24h
#
# Insere em `alerts` via service_role (BYPASSRLS), envia notificações
# via Resend pra owners+admins de cada empresa com alertas novos.
#
# MVP: hospedado em .workers.dev (sem custom domain). Logs no dashboard
# Cloudflare via [observability].

name = "source-authority-brand-monitor"
main = "src/index.ts"
compatibility_date = "2026-05-08"

[observability]
enabled = true

[triggers]
# */15 * * * * → Cert Spotter CT log poll (B5.4)
# 0 12 * * *   → daily digest 09:00 BRT (B5.6)
# 0 */4 * * *  → Instagram hashtag scan, every 4h (V2.1)
crons = ["*/15 * * * *", "0 12 * * *", "0 */4 * * *"]
